<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* ── Full Background Photo ── */
        .background-photo {
            position: fixed;
            inset: 0;
            background: url("{{ url_for('static', filename='images/splash-bg.png') }}") center bottom / cover no-repeat;
            filter: brightness(45%) contrast(1.1);
            /* ensures text is readable */
            z-index: 1;
            animation: panBg 10s ease-in-out infinite alternate;
        }

        /* ── Gentle zoom/pan ── */
        @keyframes panBg {
            from {
                transform: scale(1) translate(0, 0);
            }

            to {
                transform: scale(1.05) translate(-1%, -1%);
            }
        }

        /* ── Dark overlay for even better legibility ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 2;
        }

        /* ── Wrapper ── */
        .splash {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-align: center;
            transition: opacity 0.8s ease;
        }

        /* ── Redesigned Brand Name ── */
        .name {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            /* Reduced size for elegance */
            letter-spacing: 0.25em;
            /* spaced out letter for luxury look */
            color: #fff;

            /* Sharp, clean reveal */
            opacity: 0;
            transform: translateY(20px);
            animation: revealName 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;

            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        /* ── Accent Line ── */
        .line {
            width: 0;
            height: 2px;
            background: #f97316;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.6);
            animation: growLine 0.7s ease 1.0s forwards;
        }

        @keyframes revealName {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes growLine {
            to {
                width: 120px;
            }
        }

        /* ── Exit animation ── */
        .splash.exit {
            opacity: 0 !important;
        }
    </style>
</head>

<body>
    <div class="background-photo"></div>
    <div class="overlay"></div>

    <div class="splash" id="splash">
        <h1 class="name">SMARTFIT</h1>
        <div class="line"></div>
    </div>

    <script>
        setTimeout(function () {
            document.getElementById('splash').classList.add('exit');
            setTimeout(function () {
                window.location.href = "{{ url_for('home') }}";
            }, 800);
        }, 3200); /* Restored original wait time */
    </script>
</body>

</html>
