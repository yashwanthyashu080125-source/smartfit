{% extends "admin/admin_base.html" %}

{% block page_title %}System Settings{% endblock %}

{% block content %}
<div class="settings-container animate-fade-in">
    <div class="settings-card">
        <div class="card-header">
            <h4><i class="fas fa-cog"></i> General Settings</h4>
        </div>
        <div class="card-body">
            <form>
                <div class="form-group">
                    <label class="form-label">Site Name</label>
                    <input type="text" class="form-control" value="SmartFit">
                </div>
                <div class="form-group">
                    <label class="form-label">Default Calorie Goal</label>
                    <input type="number" class="form-control" value="2000">
                </div>
                <div class="form-group">
                    <label class="form-label">Maintenance Mode</label>
                    <div class="toggle-switch">
                        <input type="checkbox" id="maintenanceMode">
                        <label for="maintenanceMode">
                            <span class="toggle-on">On</span>
                            <span class="toggle-off">Off</span>
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Settings
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="settings-card animate-slide-up">
        <div class="card-header">
            <h4><i class="fas fa-shield-alt"></i> Security Settings</h4>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label class="form-label">Session Timeout</label>
                <select class="form-select">
                    <option>30 minutes</option>
                    <option>1 hour</option>
                    <option>2 hours</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Two-Factor Authentication</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="twoFactor" checked>
                    <label for="twoFactor">
                        <span class="toggle-on">On</span>
                        <span class="toggle-off">Off</span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
